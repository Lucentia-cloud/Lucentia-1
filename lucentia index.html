<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucentia — Cerámica que Ilumina</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#3a3d4d;--cream:#f5f0e8;--warm:#faf8f4;
  --gold:#e2c990;--mid:#6b6c7a;--light:#9a9baa;--sold:#c0392b;
}
html{scroll-behavior:smooth}
body{font-family:"Jost",sans-serif;background:var(--warm);color:#2a2b35;overflow-x:hidden;-webkit-text-size-adjust:100%}

.hero{
  background:var(--navy);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:2rem;text-align:center;
}
.hero svg{position:absolute;inset:0;width:100%;height:100%;opacity:.15;pointer-events:none}
.hero-logo{font-family:"Dancing Script",cursive;font-size:clamp(3.5rem,13vw,7.5rem);color:#fff;line-height:1;margin-bottom:.3rem;position:relative}
.hero-title{font-family:"Jost",sans-serif;font-weight:500;font-size:clamp(.85rem,3vw,1.3rem);color:#fff;letter-spacing:.26em;text-transform:uppercase;margin-bottom:.4rem;position:relative}
.hero-sub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(1rem,3vw,1.2rem);color:var(--gold);margin-bottom:2.5rem;position:relative}
.hero-btn{position:relative;display:inline-block;padding:.8rem 2.2rem;border:1px solid rgba(255,255,255,.4);color:#fff;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;-webkit-tap-highlight-color:transparent}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(250,248,244,.96);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(58,61,77,.1);
  padding:.85rem 1.4rem;display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{font-family:"Dancing Script",cursive;font-size:1.55rem;color:var(--navy);font-weight:600}
.nav-tag{font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:var(--mid)}

.filters{padding:1.3rem 1.1rem .4rem;display:flex;gap:.45rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{
  flex-shrink:0;padding:.4rem 1rem;border:1px solid rgba(58,61,77,.2);border-radius:999px;
  background:transparent;font-family:"Jost",sans-serif;font-size:.74rem;letter-spacing:.06em;
  color:var(--mid);cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;
}
.fbtn.on{background:var(--navy);border-color:var(--navy);color:#fff}

.cat{padding:1.5rem 1rem 4rem}
.cat-head{display:flex;align-items:baseline;gap:.7rem;margin-bottom:1.2rem;padding:0 .2rem}
.cat-title{font-family:"Cormorant Garamond",serif;font-size:1.45rem;color:var(--navy)}
.cat-n{font-size:.7rem;color:var(--light);letter-spacing:.06em}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:860px){.grid{grid-template-columns:repeat(4,1fr);gap:1.2rem}.cat{padding:2rem 2rem 5rem}}

.card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.card-img{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--cream)}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;bottom:.5rem;left:.5rem;background:var(--sold);color:#fff;font-size:.56rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .42rem;border-radius:2px}
.card-body{padding:.65rem .7rem .8rem}
.card-num{font-size:.6rem;color:var(--light);letter-spacing:.1em;margin-bottom:.12rem}
.card-name{font-family:"Cormorant Garamond",serif;font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:.15rem;line-height:1.2}
.card-mat{font-size:.66rem;color:var(--mid);margin-bottom:.06rem}
.card-sz{font-size:.63rem;color:var(--light);margin-bottom:.45rem}
.card-price{font-weight:500;font-size:.9rem;color:var(--navy)}

footer{background:var(--navy);text-align:center;padding:2.8rem 1.5rem}
.ft-logo{font-family:"Dancing Script",cursive;font-size:2.3rem;color:#fff;font-weight:600;margin-bottom:.2rem}
.ft-tag{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.ft-txt{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.9}
</style>
</head>

</section>

<nav>
  <div class="nav-logo">Lucentia</div>
  <div class="nav-tag">Cerámica que ilumina</div>
</nav>

<div class="filters">
  <button class="fbtn on" data-f="all">Todos</button>

  <div class="grid" id="grid"></div>
</section>

<footer>

function fmt(n){return"$"+n.toLocaleString("es-AR")}
function match(p,f){
  if(f==="all")return true;
  if(f==="disp")return!p.soldOut;
  if(f==="raku")return p.raku;
  if(f==="cer")return!p.raku;
  if(f==="sold")return p.soldOut;
  return true;
}
function render(f){
  var g=document.getElementById("grid");
  var c=document.getElementById("cnt");
  var list=products.filter(function(p){return match(p,f)});
  c.textContent=list.length+" modelos";
  g.innerHTML=list.map(function(p){
    return'<div class="card'+(p.soldOut?' sold-out':'')+'">'+
      '<div class="card-img">'+
      '<img src="'+p.img+'" alt="'+p.name+'" loading="lazy">'+
      (p.soldOut?'<div class="badge">Sold Out</div>':'')+
      '</div>'+
      '<div class="card-body">'+
      '<div class="card-num">'+p.id+'</div>'+
      '<div class="card-name">'+p.name+'</div>'+
      '<div class="card-mat">'+p.material+'</div>'+
      '<div class="card-sz">'+p.size+'</div>'+
      '<div class="card-price">'+fmt(p.price)+'</div>'+
      '</div></div>';
  }).join("");
}
document.querySelectorAll(".fbtn").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".fbtn").forEach(function(x){x.classList.remove("on")});
    b.classList.add("on");
    render(b.dataset.f);
  });
});
render("all");
</script>
